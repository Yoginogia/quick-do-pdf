<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Merge multiple JPGs or PNGs into a single image. Export to JPG, PNG, PDF, DOCX, XLSX, or PPTX format completely offline for free.">
  <link rel="canonical" href="https://quickdopdf.com/merge-images.html">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Merge Images: JPG to Document – Quick Do PDF</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"></noscript>
  
  <link rel="stylesheet" href="tools.css?v=2">
  <script src="theme.js"></script>

  <!-- Libraries for Multi-Format Export -->
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/docx@8.2.3/build/index.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

  <style>
    .config-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-top: 24px;
      display: none;
      text-align: left;
    }
    .config-panel.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }
    
    .img-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .img-row {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .img-row img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      border-radius: 8px;
      background: #000;
    }

    .img-row .info {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: var(--text);
      font-weight: 500;
    }

    .img-row .remove-btn {
      background: rgba(255, 50, 50, 0.1);
      color: #ff4444;
      border: none;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }
    .img-row .remove-btn:hover {
      background: #ff4444;
      color: #fff;
    }

    .setting-group {
      margin-bottom: 24px;
    }

    .setting-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
    }

    .tab-selector {
      display: flex;
      gap: 12px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, color-mix(in srgb, var(--a1) 20%, transparent), color-mix(in srgb, var(--a2) 20%, transparent));
      border-color: var(--a1);
    }

    .format-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
    }

    .format-btn {
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
      text-align: center;
    }

    .format-btn.active {
      background: var(--a1);
      color: #fff;
      border-color: var(--a1);
      box-shadow: 0 4px 15px color-mix(in srgb, var(--a1) 40%, transparent);
    }

    .merge-action-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--a1), var(--a2));
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 8px 25px color-mix(in srgb, var(--a1) 40%, transparent);
    }

    .merge-action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px color-mix(in srgb, var(--a1) 50%, transparent);
    }
  </style>
</head>
<body class="theme-blue">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <header>
    <a href="index.html" class="back-btn">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg> Back
    </a>
    <span class="logo">Quick Do PDF</span>
    <div class="header-right">
      <button class="theme-toggle-btn" id="themeToggle" title="Toggle Dark/Light Mode">
        <svg id="themeIcon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
      </button>
    </div>
  </header>

  <main class="tool-layout">
    <div class="hero">
      <h1>Merge Images To Document</h1>
      <p class="subtitle">Join multiple JPG/PNG images together into a custom document format completely offline.</p>
    </div>

    <div class="workspace">
      <!-- Upload Zone -->
      <div class="upload-zone" id="dropArea">
        <div class="upload-icon">🖼️</div>
        <h3>Drop Multiple Images</h3>
        <p>Select the images you want to merge</p>
        <label class="select-btn">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Select Images
          <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/bmp" multiple hidden>
        </label>
      </div>

      <!-- Loader -->
      <div id="loader" style="display: none; align-items: center; justify-content: center; flex-direction: column; padding: 40px;">
        <div class="loader-ring"></div>
        <p class="loader-text" id="loaderText" style="margin-top:20px; font-weight: 600;">Processing images...</p>
      </div>

      <!-- Config Panel -->
      <div class="config-panel" id="configPanel">
        <div class="img-list" id="imageList"></div>
        
        <!-- Add more button -->
        <label class="select-btn" style="width: 100%; justify-content: center; margin-bottom: 24px; padding: 12px; background: rgba(255,255,255,0.05); color: var(--text); border: 1px dashed var(--border);">
          + Add More Images
          <input type="file" id="moreFileInput" accept="image/*" multiple hidden>
        </label>

        <div class="setting-group">
          <label>Merge Direction:</label>
          <div class="tab-selector">
            <button class="tab-btn active" data-dir="vertical">Vertical (Top to Bottom)</button>
            <button class="tab-btn" data-dir="horizontal">Horizontal (Side by Side)</button>
          </div>
        </div>

        <div class="setting-group">
          <label>Export Format:</label>
          <div class="format-grid" id="formatGrid">
            <button class="format-btn active" data-format="jpg">JPG</button>
            <button class="format-btn" data-format="png">PNG</button>
            <button class="format-btn" data-format="pdf">PDF</button>
            <button class="format-btn" data-format="docx">DOCX</button>
            <button class="format-btn" data-format="xlsx">XLSX</button>
            <button class="format-btn" data-format="pptx">PPTX</button>
          </div>
        </div>

        <button class="merge-action-btn" id="mergeBtn">Merge & Download</button>
      </div>

      <!-- Success Panel -->
      <div id="successMsg" class="success-msg" style="display: none; text-align: center;">
        <div class="s-icon">✅</div>
        <h3>Merger Complete!</h3>
        <p style="margin-bottom: 20px;">Your merged file has been downloaded automatically.</p>
        <button class="select-btn" onclick="location.reload()" style="background: transparent; border: 1px solid var(--border); color: var(--text);">Start Over</button>
      </div>
    </div>
  </main>

  <script>
    const fileInput = document.getElementById('fileInput');
    const moreFileInput = document.getElementById('moreFileInput');
    const dropArea = document.getElementById('dropArea');
    const configPanel = document.getElementById('configPanel');
    const imageList = document.getElementById('imageList');
    const mergeBtn = document.getElementById('mergeBtn');
    const loader = document.getElementById('loader');
    const loaderText = document.getElementById('loaderText');
    const successMsg = document.getElementById('successMsg');
    
    let filesArray = [];
    let mergeDirection = 'vertical';
    let exportFormat = 'jpg';

    // File Handling
    function handleFiles(files) {
      if (files.length === 0) return;
      Array.from(files).forEach(f => {
        if (f.type.startsWith('image/')) {
          filesArray.push(f);
        }
      });
      renderList();
      dropArea.style.display = 'none';
      configPanel.style.display = 'block';
    }

    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
    moreFileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.style.borderColor = 'var(--a1)'; });
    dropArea.addEventListener('dragleave', () => { dropArea.style.borderColor = 'var(--border)'; });
    dropArea.addEventListener('drop', e => {
      e.preventDefault();
      dropArea.style.borderColor = 'var(--border)';
      handleFiles(e.dataTransfer.files);
    });

    function renderList() {
      imageList.innerHTML = '';
      filesArray.forEach((file, index) => {
        const row = document.createElement('div');
        row.className = 'img-row';
        
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        
        const info = document.createElement('div');
        info.className = 'info';
        info.textContent = `${index + 1}. ${file.name}`;

        const rmBtn = document.createElement('button');
        rmBtn.className = 'remove-btn';
        rmBtn.innerHTML = '<svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg>';
        rmBtn.onclick = () => {
          filesArray.splice(index, 1);
          renderList();
          if (filesArray.length === 0) {
            configPanel.style.display = 'none';
            dropArea.style.display = 'block';
          }
        };

        row.appendChild(img);
        row.appendChild(info);
        row.appendChild(rmBtn);
        imageList.appendChild(row);
      });
    }

    // Settings logic
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mergeDirection = btn.dataset.dir;
      });
    });

    document.querySelectorAll('.format-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        exportFormat = btn.dataset.format;
      });
    });

    // Helper: Image to ArrayBuffer
    function fileToArrayBuffer(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsArrayBuffer(file);
      });
    }

    // Helper: Render Image Object
    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
      });
    }

    // Canvas Merge Engine
    async function mergeImagesToCanvas() {
      const images = await Promise.all(filesArray.map(f => loadImage(f)));
      if (images.length === 0) throw new Error("No images to merge.");

      let totalWidth = 0, totalHeight = 0;

      if (mergeDirection === 'vertical') {
        totalWidth = Math.max(...images.map(img => img.width));
        totalHeight = images.reduce((acc, img) => acc + img.height, 0);
      } else {
        totalHeight = Math.max(...images.map(img => img.height));
        totalWidth = images.reduce((acc, img) => acc + img.width, 0);
      }

      // Safeguard against insanely huge canvases that crash RAM
      const limit = 16000;
      if (totalWidth > limit || totalHeight > limit) {
          const ratio = Math.min(limit / totalWidth, limit / totalHeight);
          totalWidth = Math.floor(totalWidth * ratio);
          totalHeight = Math.floor(totalHeight * ratio);
      }

      const canvas = document.createElement('canvas');
      canvas.width = totalWidth;
      canvas.height = totalHeight;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = "#FFFFFF";
      ctx.fillRect(0, 0, totalWidth, totalHeight);

      let currentX = 0, currentY = 0;
      for (const img of images) {
        if (mergeDirection === 'vertical') {
           // Scale to fit width if necessary
           let drawW = img.width;
           let drawH = img.height;
           if (img.width > totalWidth) {
               drawW = totalWidth;
               drawH = img.height * (totalWidth / img.width);
           }
           let xOffset = (totalWidth - drawW) / 2;
           ctx.drawImage(img, xOffset, currentY, drawW, drawH);
           currentY += drawH;
        } else {
           let drawW = img.width;
           let drawH = img.height;
           if (img.height > totalHeight) {
               drawH = totalHeight;
               drawW = img.width * (totalHeight / img.height);
           }
           let yOffset = (totalHeight - drawH) / 2;
           ctx.drawImage(img, currentX, yOffset, drawW, drawH);
           currentX += drawW;
        }
      }

      return canvas;
    }

    // Export Engine
    mergeBtn.addEventListener('click', async () => {
      if (filesArray.length === 0) return;
      configPanel.style.display = 'none';
      loader.style.display = 'flex';
      loaderText.textContent = `Merging ${filesArray.length} images into ${exportFormat.toUpperCase()}...`;

      try {
        const canvas = await mergeImagesToCanvas();
        const baseFileName = `merged_${filesArray.length}_files`;

        if (exportFormat === 'jpg' || exportFormat === 'png') {
          const mime = exportFormat === 'jpg' ? 'image/jpeg' : 'image/png';
          canvas.toBlob((blob) => {
            triggerDownload(blob, `${baseFileName}.${exportFormat}`);
          }, mime, 0.95);
        } 
        else if (exportFormat === 'pdf') {
          const { PDFDocument } = PDFLib;
          const pdfDoc = await PDFDocument.create();
          
          let jpgBuffer;
          await new Promise(r => canvas.toBlob(blob => {
             const reader = new FileReader();
             reader.onload = e => { jpgBuffer = e.target.result; r(); };
             reader.readAsArrayBuffer(blob);
          }, 'image/jpeg', 0.95));

          const pdfImage = await pdfDoc.embedJpg(jpgBuffer);
          const page = pdfDoc.addPage([pdfImage.width, pdfImage.height]);
          page.drawImage(pdfImage, { x: 0, y: 0, width: pdfImage.width, height: pdfImage.height });
          
          const pdfBytes = await pdfDoc.save();
          triggerDownload(new Blob([pdfBytes], { type: 'application/pdf' }), `${baseFileName}.pdf`);
        }
        else if (exportFormat === 'docx') {
          canvas.toBlob(blob => {
             const reader = new FileReader();
             reader.onload = async (e) => {
                 const arrayBuffer = e.target.result;
                 
                 const doc = new docx.Document({
                     sections: [{
                         properties: {
                             page: {
                               margin: { top: 0, right: 0, bottom: 0, left: 0 }
                             }
                         },
                         children: [
                             new docx.Paragraph({
                                 children: [
                                     new docx.ImageRun({
                                         data: arrayBuffer,
                                         transformation: {
                                             width: Math.min(canvas.width, 700), // Docx standard scaling max
                                             height: Math.min(canvas.height, 700 * (canvas.height/canvas.width))
                                         }
                                     })
                                 ]
                             })
                         ]
                     }]
                 });
                 const docxBlob = await docx.Packer.toBlob(doc);
                 triggerDownload(docxBlob, `${baseFileName}.docx`);
             };
             reader.readAsArrayBuffer(blob);
          }, 'image/jpeg');
        }
        else if (exportFormat === 'xlsx') {
          const wb = new ExcelJS.Workbook();
          const ws = wb.addWorksheet('Merged Image');
          const dataUrl = canvas.toDataURL('image/jpeg');
          const imageId = wb.addImage({
            base64: dataUrl,
            extension: 'jpeg',
          });
          // Add image covering A1 roughly
          ws.addImage(imageId, {
            tl: { col: 0, row: 0 },
            ext: { width: Math.min(canvas.width, 1000), height: Math.min(canvas.height, 1000 * (canvas.height/canvas.width)) }
          });
          const buffer = await wb.xlsx.writeBuffer();
          triggerDownload(new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }), `${baseFileName}.xlsx`);
        }
        else if (exportFormat === 'pptx') {
          let pptx = new pptxgen();
          let slide = pptx.addSlide();
          const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
          slide.addImage({ data: dataUrl, x: 0, y: 0, w: '100%', h: '100%', sizing: { type: 'contain' } });
          const blobData = await pptx.write({ outputType: 'blob' });
          triggerDownload(blobData, `${baseFileName}.pptx`);
        }

      } catch (err) {
        alert("Merger failed: " + err.message);
        configPanel.style.display = 'block';
        loader.style.display = 'none';
      }
    });

    function triggerDownload(blob, filename) {
      loader.style.display = 'none';
      successMsg.style.display = 'block';

      if (window.converterObjectUrl) URL.revokeObjectURL(window.converterObjectUrl);
      window.converterObjectUrl = URL.createObjectURL(blob);
      
      const link = document.createElement('a');
      link.href = window.converterObjectUrl;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
