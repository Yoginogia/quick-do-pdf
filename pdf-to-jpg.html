<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Convert each PDF page to high-quality JPG images online for free. Download as ZIP, no signup required.">
  <meta name="author" content="Quick Do PDF">

  <link rel="canonical" href="https://quickdopdf.com/pdf-to-jpg.html">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>PDF to JPG – Quick Do PDF</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"></noscript>
  <link rel="stylesheet" href="tools.css?v=2">

  <script src="theme.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3543763798528021" crossorigin="anonymous"></script>
</head>

<body class="theme-purple">
  <div id="loader">
    <div class="loader-ring"></div>
    <p class="loader-text" id="ldrTxt">Converting PDF...</p>
    <p class="loader-sub">Rendering each page</p>
  </div>
  <header>
    <a href="index.html" class="back-btn"><svg width="16" height="16" fill="none" stroke="currentColor"
        viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg> Back</a>
    <span class="logo">Quick Do PDF</span>
    <div class="header-right">
      <button class="theme-toggle-btn" id="themeToggle" title="Toggle Dark/Light Mode">
        <svg id="themeIcon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
          </path>
        </svg>
      </button>
    </div>
  </header>
  <main>
    <h1 class="page-title">PDF <span>to JPG</span></h1>
    <p class="page-subtitle">Convert every PDF page into a high-quality image</p>

    <div class="upload-zone" id="dropArea">
      <div class="upload-icon">🖼️</div>
      <h3>Drop your PDF file here</h3>
      <p>Each page will become a separate JPG image</p>
      <label class="select-btn">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Select PDF File
        <input type="file" id="pdfInput" accept="application/pdf">
      </label>
    </div>

    <div id="fileInfo"></div>

    <div class="option-card hidden" id="qualCard">
      <h4>Image Quality</h4>
      <div class="option-grid cols3">
        <button class="opt-btn" data-scale="1" onclick="pick(this)">
          <div class="oi">🔵</div><span class="on">Standard</span><span class="od">72 DPI · Fast</span>
        </button>
        <button class="opt-btn active" data-scale="2" onclick="pick(this)">
          <div class="oi">🟣</div><span class="on">High</span><span class="od">144 DPI · Best</span>
        </button>
        <button class="opt-btn" data-scale="3" onclick="pick(this)">
          <div class="oi">⚡</div><span class="on">Ultra</span><span class="od">216 DPI · Slow</span>
        </button>
      </div>
    </div>

    <button class="action-btn hidden" id="actionBtn" onclick="convertToJPG()">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
      Convert to JPG
    </button>

    <div id="resultArea"></div>
  

    

  </main>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const inp = document.getElementById('pdfInput');
    const drop = document.getElementById('dropArea');
    const info = document.getElementById('fileInfo');
    const btn = document.getElementById('actionBtn');
    const ldr = document.getElementById('loader');
    const qualCard = document.getElementById('qualCard');
    const result = document.getElementById('resultArea');
    let scale = 2;

    inp.addEventListener('change', () => { if (inp.files[0]) loadFile(inp.files[0]); });
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('over'));
    drop.addEventListener('drop', e => {
      e.preventDefault(); drop.classList.remove('over');
      const f = [...e.dataTransfer.files].find(f => f.type === 'application/pdf');
      if (f) { const dt = new DataTransfer(); dt.items.add(f); inp.files = dt.files; loadFile(f); }
    });

    function pick(el) {
      document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      scale = parseInt(el.dataset.scale);
    }
    function fmt(b) { return b < 1048576 ? (b / 1024).toFixed(1) + ' KB' : (b / 1048576).toFixed(2) + ' MB'; }

    async function loadFile(file) {
      result.innerHTML = ''; info.innerHTML = '';
      const bytes = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
      const pages = pdf.numPages;
      info.innerHTML = `<div class="file-item"><span class="fi">📄</span><span class="fn">${file.name}</span><span class="fc">${pages} pages</span><span class="fs">${fmt(file.size)}</span></div>`;
      qualCard.classList.remove('hidden');
      btn.classList.remove('hidden');
    }

    async function convertToJPG() {
      const file = inp.files[0];
      if (!file) { alert('Select a PDF file'); return; }

      result.innerHTML = '';

      // Show loader briefly
      ldr.classList.add('active');
      const bytes = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
      const total = pdf.numPages;
      ldr.classList.remove('active');

      // Build result grid header
      const hdr = document.createElement('div'); hdr.className = 'section-label';
      hdr.textContent = `${total} page${total > 1 ? 's' : ''} extracted successfully!`;
      result.appendChild(hdr);

      const dlAllBtn = document.createElement('button');
      dlAllBtn.className = 'action-btn';
      dlAllBtn.style.marginBottom = '24px';
      dlAllBtn.innerHTML = '<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg> Download All Images (ZIP)';
      result.appendChild(dlAllBtn);

      const grid = document.createElement('div'); grid.className = 'img-grid';
      result.appendChild(grid);

      const zip = new JSZip();

      for (let i = 1; i <= total; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: ctx, viewport }).promise;

        const imgData = canvas.toDataURL('image/jpeg', 0.92);
        zip.file(`page-${i}.jpg`, imgData.split(',')[1], { base64: true });

        // Small preview canvas
        const thumb = document.createElement('canvas');
        const tCtx = thumb.getContext('2d');
        const thumbW = 160;
        const thumbH = Math.round(canvas.height * (thumbW / canvas.width));
        thumb.width = thumbW; thumb.height = thumbH;
        tCtx.drawImage(canvas, 0, 0, thumbW, thumbH);

        const card = document.createElement('div'); card.className = 'img-card'; card.style.animationDelay = (i - 1) * 80 + 'ms';
        const num = document.createElement('div'); num.className = 'ic-num'; num.textContent = i;
        const lbl = document.createElement('div'); lbl.className = 'ic-label'; lbl.textContent = `Page ${i}`;
        const dlBtn = document.createElement('button'); dlBtn.className = 'ic-dl'; dlBtn.textContent = '⬇ Download';
        dlBtn.addEventListener('click', () => {
          const a = document.createElement('a'); a.href = imgData; a.download = `page-${i}.jpg`;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
        });
        card.appendChild(thumb); card.appendChild(num); card.appendChild(lbl); card.appendChild(dlBtn);
        grid.appendChild(card);

        await new Promise(r => setTimeout(r, 30));
      }

      dlAllBtn.addEventListener('click', async () => {
        dlAllBtn.innerHTML = '<div class="loader-ring" style="width:20px;height:20px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:8px"></div> Packaging...';
        dlAllBtn.style.pointerEvents = 'none';
        const content = await zip.generateAsync({ type: "blob" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = file.name.replace('.pdf', '') + '_images.zip';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        dlAllBtn.innerHTML = '<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> ZIP Downloaded!';
        setTimeout(() => {
          dlAllBtn.innerHTML = '<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg> Download Again (ZIP)';
          dlAllBtn.style.pointerEvents = 'auto';
        }, 3000);
      });
    }
  </script>
