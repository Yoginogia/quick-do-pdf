<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Scan documents using your phone camera and convert to PDF. Free mobile-friendly scanner, works in browser.">
  <meta name="author" content="Quick Do PDF">

    <link rel="canonical" href="https://quickdopdf.com/scan-to-pdf.html">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Scan to PDF – Quick Do PDF</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Unpkg jsPDF for creating PDF from images -->
    <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>

    <!-- Cropper.js for Document Area Selection -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <link rel="stylesheet" href="tools.css?v=2">

    <style>
        .camera-container {
            width: 100%;
            height: 65vh;
            min-height: 400px;
            max-height: 600px;
            margin: 0 auto 32px;
            background: #111;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        @media(max-width: 768px) {
            .camera-container {
                border-radius: 12px;
                height: 75vh;
                max-height: calc(100vh - 160px);
            }
        }

        #camVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            /* transform scaleX(-1) applied dynamically via JS depending on front/back cam */
        }

        .cam-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            z-index: 2;
        }

        .cam-controls {
            position: absolute;
            bottom: 24px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 16px;
            z-index: 10;
        }

        .capture-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 4px solid #fff;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none;
            backdrop-filter: blur(8px);
        }

        .capture-btn:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.4);
        }

        .capture-btn:active {
            transform: scale(0.95);
            background: #fff;
        }

        .cam-init-btn {
            padding: 12px 24px;
            border-radius: 100px;
            background: linear-gradient(135deg, #2dd4bf, #0ea5e9);
            color: #fff;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s;
            box-shadow: 0 10px 20px rgba(45, 212, 191, 0.2);
        }

        .cam-init-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(45, 212, 191, 0.3);
        }

        .cam-switch-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        .cam-switch-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .scan-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 3/4;
            background: #1a1b26;
            border: 1px solid var(--border);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .scan-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scan-item .del-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scan-item .scan-num {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .pulse-flash {
            animation: flash 0.3s ease-out;
        }

        @keyframes flash {
            0% {
                background: rgba(255, 255, 255, 0.8);
            }

            100% {
                background: transparent;
            }
        }

        /* Cropper Modal */
        #cropModal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: none;
            flex-direction: column;
        }

        #cropContainer {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #cropImage {
            display: block;
            max-width: 100%;
        }

        .crop-controls {
            padding: 24px;
            display: flex;
            gap: 16px;
            justify-content: center;
            background: #111;
            border-top: 1px solid #333;
        }

        .crop-btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .crop-cancel {
            background: #333;
            color: white;
        }

        .crop-save {
            background: var(--c1, #2dd4bf);
            color: white;
        }

        /* 2-Column Premium Layout */
        .scan-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        @media(min-width: 900px) {
            .scan-layout {
                grid-template-columns: 1fr 1fr;
                align-items: start;
            }
        }

        .scan-step {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .step-num {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: var(--c1, #2dd4bf);
            color: #fff;
            border-radius: 50%;
            font-weight: 800;
            font-size: 16px;
        }

        .step-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin: 0;
        }

        /* Adjust existing container for new layout */
        .camera-container {
            margin-bottom: 0;
            border: none;
            box-shadow: none;
            background: #111;
            border-radius: 16px;
        }
    </style>

    <script src="theme.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3543763798528021" crossorigin="anonymous"></script>
</head>

<body class="theme-teal">
    <div id="loader">
        <div class="loader-ring"></div>
        <p class="loader-text">Generating PDF...</p>
        <p class="loader-sub">Stitching scans natively</p>
    </div>

    <header>
        <a href="index.html" class="back-btn"><svg width="16" height="16" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg> Back</a>
        <span class="logo">Quick Do PDF</span>
        <div class="header-right">
            <button class="theme-toggle-btn" id="themeToggle" title="Toggle Dark/Light Mode">
                <svg id="themeIcon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
                    </path>
                </svg>
            </button>
        </div>
    </header>

    <main>
        <h1 class="page-title">Scan <span>to PDF</span></h1>
        <p class="page-subtitle">Use your device camera to securely scan physical documents directly into a PDF.</p>

        <div class="scan-layout">
            <!-- STEP 1 -->
            <div class="scan-step">
                <div class="step-header">
                    <div class="step-num">1</div>
                    <h2 class="step-title">Capture Documents</h2>
                </div>

                <div class="camera-container" id="camContainer">
                    <video id="camVideo" autoplay playsinline></video>
                    <div class="cam-overlay"></div>

                    <button class="cam-switch-btn" id="switchCamBtn" title="Swap Camera (Front/Back)">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>

                    <button class="cam-init-btn" id="initBtn">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        Enable Camera
                    </button>

                    <div class="cam-controls">
                        <button class="capture-btn" id="captureBtn" title="Take Scan"></button>
                    </div>
                </div>
            </div>

            <!-- STEP 2 -->
            <div class="scan-step">
                <div class="step-header">
                    <div class="step-num">2</div>
                    <h2 class="step-title">Review & Generate</h2>
                </div>

                <p style="color:var(--muted); font-size:14px; margin-bottom:16px;">Scanned pages will appear here. You
                    can remove unwanted scans.</p>

                <!-- Hidden Canvas for frame extraction -->
                <canvas id="hiddenCanvas" style="display:none;"></canvas>

                <div class="gallery-grid" id="galleryGrid"
                    style="min-height: 160px; align-content: start; border: 1px dashed var(--border); border-radius: 12px; padding: 16px; margin-bottom: 24px;">
                </div>

                <div class="settings-bar hidden" id="settingsBar"
                    style="display:flex; flex-direction:column; gap:16px; margin-bottom:24px;">
                    <label
                        style="color:var(--text); font-weight:600; font-size: 14px; display:flex; flex-direction:column; gap:8px;">
                        Page Size:
                        <select id="pageSize"
                            style="padding:10px 16px; border-radius:12px; font-weight:500; font-family:inherit; font-size:14px; background:var(--surface); border:1px solid var(--border); color:var(--text); cursor:pointer;">
                            <optgroup label="Auto Format">
                                <option value="fit" selected>Fit to Image (Best)</option>
                            </optgroup>
                            <optgroup label="Standard Document">
                                <option value="a4">A4 (Standard)</option>
                                <option value="letter">US Letter</option>
                            </optgroup>
                        </select>
                    </label>
                    <label
                        style="color:var(--text); font-weight:600; font-size: 14px; display:flex; flex-direction:column; gap:8px;">
                        PDF Target Size:
                        <select id="compressionLevel"
                            style="padding:10px 16px; border-radius:12px; font-weight:500; font-family:inherit; font-size:14px; background:var(--surface); border:1px solid var(--border); color:var(--text); cursor:pointer;">
                            <option value="1.0" selected>High Quality (Large File)</option>
                            <option value="0.7">Medium (~1.5 MB)</option>
                            <option value="0.4">Small (~500 KB)</option>
                        </select>
                    </label>
                </div>

                <button class="action-btn hidden" id="actionBtn" onclick="generatePDF()" style="width: 100%;">
                    <span><svg style="margin-right: 8px; vertical-align: text-bottom;" width="20" height="20"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg> Generate PDF (<span id="scanCount">0</span> pages)</span>
                </button>
            </div>
        </div>
    

    

  </main>

    <!-- Crop Modal Overlay -->
    <div id="cropModal">
        <div id="cropContainer">
            <img id="cropImage" src="">
        </div>
        <div class="crop-controls">
            <button class="crop-btn crop-cancel" id="cancelCropBtn">Cancel</button>
            <button class="crop-btn crop-save" id="confirmCropBtn">Crop & Save</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('camVideo');
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');
        const initBtn = document.getElementById('initBtn');
        const captureBtn = document.getElementById('captureBtn');
        const switchCamBtn = document.getElementById('switchCamBtn');
        const galleryGrid = document.getElementById('galleryGrid');
        const actionBtn = document.getElementById('actionBtn');
        const scanCountEl = document.getElementById('scanCount');
        const ldr = document.getElementById('loader');
        const camContainer = document.getElementById('camContainer');

        let stream = null;
        let scans = []; // Array to hold base64 image data URIs
        let facingMode = "environment"; // Try rear camera first on mobile

        // Check platform capability
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            initBtn.textContent = 'Camera not supported in this browser';
            initBtn.disabled = true;
            initBtn.style.background = '#666';
        }

        initBtn.addEventListener('click', async () => {
            await startCamera(facingMode);
        });

        switchCamBtn.addEventListener('click', async () => {
            facingMode = facingMode === "environment" ? "user" : "environment";
            await startCamera(facingMode);
        });

        async function startCamera(desiredMode) {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }

            try {
                // Mobile-first robust constraints
                const constraints = {
                    audio: false,
                    video: {
                        width: { ideal: 1920, max: 3840 },
                        height: { ideal: 1080, max: 2160 }
                    }
                };

                // On mobile devices, 'environment' sometimes needs to be forced with 'exact'
                // However, on desktops without a rear camera, 'exact' will throw an error.
                // We'll try 'exact' first for mobile reliability, fallback to ideal, then standard.
                let useMode = desiredMode;
                try {
                    // Try strict rear camera first
                    if (desiredMode === 'environment') {
                        constraints.video.facingMode = { exact: "environment" };
                        stream = await navigator.mediaDevices.getUserMedia(constraints);
                    } else {
                        throw new Error("Skip exact");
                    }
                } catch (e) {
                    // Fallback to ideal or user choice
                    constraints.video.facingMode = desiredMode;
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                }

                video.srcObject = stream;

                // Adjust mirror effect if front loaded
                const track = stream.getVideoTracks()[0];
                const settings = track.getSettings();
                if (settings.facingMode === 'user' || desiredMode === 'user') {
                    video.style.transform = 'scaleX(-1)';
                } else {
                    video.style.transform = 'scaleX(1)';
                }

                // Attempt to autofocus if supported by the device
                if (track.getCapabilities && track.getCapabilities().focusMode) {
                    try { await track.applyConstraints({ advanced: [{ focusMode: "continuous" }] }); }
                    catch (err) { console.log("Autofocus not supported."); }
                }

                video.style.display = 'block';
                initBtn.style.display = 'none';
                captureBtn.style.display = 'block';

                // Check if multiple cameras available to show switch button
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoInputs = devices.filter(d => d.kind === 'videoinput');
                if (videoInputs.length > 1) {
                    switchCamBtn.style.display = 'flex';
                }

            } catch (err) {
                console.error("Camera access denied or failed", err);
                alert("Could not access camera. Please check permissions and ensure you are on HTTPS.");
            }
        }

        let cropperAPI = null;
        const cropModal = document.getElementById('cropModal');
        const cropImage = document.getElementById('cropImage');
        const cancelCropBtn = document.getElementById('cancelCropBtn');
        const confirmCropBtn = document.getElementById('confirmCropBtn');

        captureBtn.addEventListener('click', () => {
            if (!stream) return;

            // Visual feedback
            camContainer.classList.remove('pulse-flash');
            void camContainer.offsetWidth; // trigger reflow
            camContainer.classList.add('pulse-flash');

            // Draw current video frame to hidden canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            if (video.style.transform === 'scaleX(-1)') {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const dataUrl = canvas.toDataURL('image/jpeg', 1.0);

            // Open Cropper
            cropImage.src = dataUrl;
            cropModal.style.display = 'flex';

            if (cropperAPI) {
                cropperAPI.destroy();
            }

            cropperAPI = new Cropper(cropImage, {
                viewMode: 1,
                dragMode: 'crop',
                autoCropArea: 0.9,
                restore: false,
                guides: true,
                center: true,
                highlight: false,
                cropBoxMovable: true,
                cropBoxResizable: true,
                toggleDragModeOnDblclick: false,
            });
        });

        cancelCropBtn.addEventListener('click', () => {
            cropModal.style.display = 'none';
            if (cropperAPI) cropperAPI.destroy();
        });

        confirmCropBtn.addEventListener('click', () => {
            if (!cropperAPI) return;
            const croppedCanvas = cropperAPI.getCroppedCanvas({
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high',
            });

            if (croppedCanvas) {
                const finalDataUrl = croppedCanvas.toDataURL('image/jpeg', 0.95);
                scans.push(finalDataUrl);
                renderGallery();
            }

            cropModal.style.display = 'none';
            cropperAPI.destroy();
        });

        function renderGallery() {
            galleryGrid.innerHTML = '';

            if (scans.length > 0) {
                actionBtn.classList.remove('hidden');
                document.getElementById('settingsBar').classList.remove('hidden');
                scanCountEl.textContent = scans.length;
            } else {
                actionBtn.classList.add('hidden');
                document.getElementById('settingsBar').classList.add('hidden');
            }

            scans.forEach((dataUrl, index) => {
                const item = document.createElement('div');
                item.className = 'scan-item';

                const img = document.createElement('img');
                img.src = dataUrl;

                const num = document.createElement('div');
                num.className = 'scan-num';
                num.textContent = index + 1;

                const delBtn = document.createElement('button');
                delBtn.className = 'del-btn';
                delBtn.innerHTML = '✕';
                delBtn.title = 'Remove scan';
                delBtn.onclick = () => {
                    scans.splice(index, 1);
                    renderGallery();
                };

                item.appendChild(img);
                item.appendChild(num);
                item.appendChild(delBtn);
                galleryGrid.appendChild(item);
            });

            // Scroll down a bit automatically to show new scans
            if (scans.length > 0) {
                galleryGrid.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
        }

        async function generatePDF() {
            if (scans.length === 0) return;
            ldr.classList.add('active');

            try {
                const { jsPDF } = window.jspdf;
                const pageSizeType = document.getElementById('pageSize').value;
                const compLevel = parseFloat(document.getElementById('compressionLevel').value);

                const pdf = new jsPDF({
                    orientation: 'p',
                    unit: 'px',
                    format: pageSizeType === 'fit' ? 'a4' : pageSizeType
                });

                pdf.deletePage(1);

                for (let i = 0; i < scans.length; i++) {
                    let dataUrl = scans[i];

                    // Process compression if requested
                    if (compLevel < 1.0) {
                        const compImg = new Image();
                        await new Promise(res => { compImg.onload = res; compImg.src = dataUrl; });

                        const compCanvas = document.createElement('canvas'); // Temp canvas
                        // Scale down resolution along with quality for smaller file size chunks
                        const scale = compLevel === 0.4 ? 0.6 : 0.8;
                        compCanvas.width = compImg.width * scale;
                        compCanvas.height = compImg.height * scale;

                        const compCtx = compCanvas.getContext('2d');
                        compCtx.drawImage(compImg, 0, 0, compCanvas.width, compCanvas.height);

                        // Re-export with target jpeg quality
                        dataUrl = compCanvas.toDataURL('image/jpeg', compLevel);
                    }

                    // Create final Image object for PDF insertion
                    const img = new Image();
                    await new Promise(resolve => {
                        img.onload = resolve;
                        img.src = dataUrl;
                    });

                    if (pageSizeType === 'fit') {
                        // Fit to Image: Add a new page matching the image dimensions exactly
                        const orientation = img.width > img.height ? 'l' : 'p';
                        pdf.addPage([img.width, img.height], orientation);
                        pdf.addImage(dataUrl, 'JPEG', 0, 0, img.width, img.height);
                    } else {
                        // Standard Page: A4 or US Letter
                        pdf.addPage(pageSizeType, 'p');

                        const pdfWidth = pdf.internal.pageSize.getWidth();
                        const pdfHeight = pdf.internal.pageSize.getHeight();

                        // Calculate scale to fit image within page constraints centrally
                        const ratio = Math.min(pdfWidth / img.width, pdfHeight / img.height);

                        // We apply a slight 0.95 multiplier to give the standard doc a nice small margin
                        const finalRatio = ratio * 0.95;

                        const scaledW = img.width * finalRatio;
                        const scaledH = img.height * finalRatio;

                        const x = (pdfWidth - scaledW) / 2;
                        const y = (pdfHeight - scaledH) / 2;

                        pdf.addImage(dataUrl, 'JPEG', x, y, scaledW, scaledH);
                    }
                }

                // Trigger Download
                pdf.save('QuickDoPDF-Scans.pdf');
                ldr.classList.remove('active');

            } catch (err) {
                console.error(err);
                ldr.classList.remove('active');
                alert("Error generating PDF. Make sure your browser supports this operation.");
            }
        }
    </script>
</body>
