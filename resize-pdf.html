<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Resize PDF page dimensions online for free. Convert between A4, Letter, Legal, A3, and custom sizes. No upload needed, works in your browser.">
  <meta name="author" content="Quick Do PDF">
  <meta name="keywords" content="resize pdf pages, change pdf page size, a4 to letter pdf, pdf page dimensions, pdf resize free">
  <link rel="canonical" href="https://quickdopdf.com/resize-pdf.html">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Resize PDF Pages Free — Change Page Dimensions | Quick Do PDF</title>
  <link rel="stylesheet" href="tools.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="theme.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3543763798528021" crossorigin="anonymous"></script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "HowTo",
    "name": "How to Resize PDF Pages Online",
    "description": "Change PDF page dimensions (A4, Letter, Legal) for free.",
    "step": [
      {"@type": "HowToStep", "position": 1, "name": "Upload PDF", "text": "Click upload or drag your PDF file."},
      {"@type": "HowToStep", "position": 2, "name": "Select target size", "text": "Choose the target page size like A4, Letter, Legal, or enter custom dimensions."},
      {"@type": "HowToStep", "position": 3, "name": "Download resized PDF", "text": "Click Resize & Download to get the PDF with new page dimensions."}
    ]
  }
  </script>
</head>
<body>
  <header>
    <a href="index.html" class="back-btn">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg> Back
    </a>
    <span class="logo">Quick Do PDF</span>
    <div class="header-right">
      <button class="theme-toggle-btn" id="themeToggle" title="Toggle Dark/Light Mode">
        <svg id="themeIcon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="tool-hero">
    <h1>📐 Resize PDF Pages</h1>
    <p class="subtitle">Change PDF page dimensions to A4, Letter, Legal, or custom sizes. Content is scaled to fit the new page.</p>
  </div>

  <div class="upload-section">
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📐</div>
      <div class="upload-text">Drop PDF here or click to upload</div>
      <div class="upload-hint">Your file stays in your browser — never uploaded</div>
      <input type="file" id="fileInput" accept=".pdf" hidden>
    </div>
  </div>

  <div id="optionsArea" style="display:none; max-width:600px; margin:0 auto; padding:20px 24px;">
    <div style="background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px;">
      <h3 style="margin-bottom:20px; font-size:1.2rem;">Choose Target Page Size</h3>

      <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:24px;">
        <button class="size-btn active" data-w="595.28" data-h="841.89" onclick="selectSize(this)">A4 (210×297mm)</button>
        <button class="size-btn" data-w="612" data-h="792" onclick="selectSize(this)">Letter (8.5×11in)</button>
        <button class="size-btn" data-w="612" data-h="1008" onclick="selectSize(this)">Legal (8.5×14in)</button>
        <button class="size-btn" data-w="841.89" data-h="1190.55" onclick="selectSize(this)">A3 (297×420mm)</button>
        <button class="size-btn" data-w="419.53" data-h="595.28" onclick="selectSize(this)">A5 (148×210mm)</button>
        <button class="size-btn" data-w="0" data-h="0" onclick="selectSize(this)">Custom</button>
      </div>

      <div id="customDims" style="display:none; margin-bottom:20px;">
        <div style="display:flex; gap:12px; align-items:end;">
          <div style="flex:1;">
            <label style="font-size:13px; color:var(--muted); display:block; margin-bottom:6px;">Width (mm)</label>
            <input type="number" id="customW" value="210" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:rgba(255,255,255,0.04); color:var(--text); font-size:1rem;">
          </div>
          <span style="color:var(--muted); padding-bottom:12px;">×</span>
          <div style="flex:1;">
            <label style="font-size:13px; color:var(--muted); display:block; margin-bottom:6px;">Height (mm)</label>
            <input type="number" id="customH" value="297" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:rgba(255,255,255,0.04); color:var(--text); font-size:1rem;">
          </div>
        </div>
      </div>

      <div style="margin-bottom:20px;">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:14px; color:var(--text);">
          <input type="checkbox" id="scaleContent" checked> Scale content to fit new page size
        </label>
      </div>

      <p id="fileInfo" style="font-size:13px; color:var(--muted); margin-bottom:20px;"></p>

      <button class="download-btn" id="resizeBtn" style="width:100%;">📐 Resize & Download</button>
    </div>
  </div>

  <style>
    .size-btn {
      padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); cursor: pointer; font-weight: 600;
      font-size: 13px; transition: 0.3s; text-align: center;
    }
    .size-btn:hover { border-color: var(--a1); }
    .size-btn.active { border-color: var(--a1); background: rgba(255,42,95,0.1); color: var(--a1); }
  </style>

  <script>
    let pdfBytes = null;
    let targetW = 595.28, targetH = 841.89; // A4 default

    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const optionsArea = document.getElementById('optionsArea');

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = 'var(--a1)'; });
    uploadArea.addEventListener('dragleave', () => uploadArea.style.borderColor = '');
    uploadArea.addEventListener('drop', e => {
      e.preventDefault(); uploadArea.style.borderColor = '';
      if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

    async function handleFile(file) {
      pdfBytes = await file.arrayBuffer();
      const { PDFDocument } = PDFLib;
      const doc = await PDFDocument.load(pdfBytes);
      const pages = doc.getPages();
      const first = pages[0].getSize();
      document.getElementById('fileInfo').textContent = `📄 ${file.name} — ${pages.length} page(s), current size: ${Math.round(first.width/2.835)}×${Math.round(first.height/2.835)}mm`;
      optionsArea.style.display = 'block';
      uploadArea.parentElement.style.display = 'none';
    }

    function selectSize(btn) {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      targetW = parseFloat(btn.dataset.w);
      targetH = parseFloat(btn.dataset.h);
      document.getElementById('customDims').style.display = targetW === 0 ? 'block' : 'none';
    }

    document.getElementById('resizeBtn').addEventListener('click', async () => {
      const btn = document.getElementById('resizeBtn');
      btn.textContent = '⏳ Processing...';
      btn.disabled = true;

      try {
        const { PDFDocument } = PDFLib;
        const srcDoc = await PDFDocument.load(pdfBytes);
        const outDoc = await PDFDocument.create();

        let finalW = targetW, finalH = targetH;
        if (targetW === 0) {
          finalW = parseFloat(document.getElementById('customW').value) * 2.835;
          finalH = parseFloat(document.getElementById('customH').value) * 2.835;
        }

        const scaleContent = document.getElementById('scaleContent').checked;
        const srcPages = srcDoc.getPages();

        for (let i = 0; i < srcPages.length; i++) {
          const [embedded] = await outDoc.embedPages([srcPages[i]]);
          const page = outDoc.addPage([finalW, finalH]);

          if (scaleContent) {
            const srcSize = srcPages[i].getSize();
            const scaleX = finalW / srcSize.width;
            const scaleY = finalH / srcSize.height;
            const s = Math.min(scaleX, scaleY);
            const x = (finalW - srcSize.width * s) / 2;
            const y = (finalH - srcSize.height * s) / 2;
            page.drawPage(embedded, { x, y, width: srcSize.width * s, height: srcSize.height * s });
          } else {
            page.drawPage(embedded, { x: 0, y: finalH - srcPages[i].getSize().height });
          }
        }

        const output = await outDoc.save();
        const blob = new Blob([output], { type: 'application/pdf' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'resized.pdf';
        a.click();
      } catch(err) {
        alert('Error: ' + err.message);
      } finally {
        btn.textContent = '📐 Resize & Download';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
