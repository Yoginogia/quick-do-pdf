<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found - Quick Do PDF. Return to our free online PDF tools.">
  <title>404 - Page Not Found | Quick Do PDF</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0d0f1a; --text: #e8eaf0; --muted: #8b8fa3; --a1: #ff2a5f; --a2: #00a3ff; --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08); }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; overflow: hidden; }
    .orb { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.15; z-index: -1; animation: float 20s ease-in-out infinite; }
    .orb1 { width: 500px; height: 500px; background: var(--a1); top: -200px; left: -100px; }
    .orb2 { width: 400px; height: 400px; background: var(--a2); bottom: -150px; right: -50px; animation-delay: -10s; }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(30px); } }
    .error-code { font-size: 8rem; font-weight: 800; background: linear-gradient(135deg, var(--a1), var(--a2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 16px; }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 12px; }
    p { color: var(--muted); font-size: 1.1rem; max-width: 500px; line-height: 1.6; margin-bottom: 32px; }
    .actions { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .btn { padding: 14px 28px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 1rem; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: linear-gradient(135deg, var(--a1), var(--a2)); color: #fff; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,42,95,0.3); }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--a1); transform: translateY(-2px); }
    .popular-tools { margin-top: 48px; }
    .popular-tools h3 { font-size: 0.9rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
    .tool-pills { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .tool-pill { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; color: var(--text); text-decoration: none; font-size: 13px; font-weight: 500; transition: 0.3s; }
    .tool-pill:hover { border-color: var(--a1); background: rgba(255,42,95,0.08); }
  </style>
  <script src="theme.js"></script>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="error-code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Don't worry — our 40+ free PDF tools are just a click away!</p>

  <div class="actions">
    <a href="index.html" class="btn btn-primary">🏠 Go to Homepage</a>
    <a href="blog/" class="btn btn-secondary">📝 Read Blog</a>
  </div>

  <div class="popular-tools">
    <h3>Popular Tools</h3>
    <div class="tool-pills">
      <a href="compress.html" class="tool-pill">🗜️ Compress PDF</a>
      <a href="merge.html" class="tool-pill">📂 Merge PDF</a>
      <a href="split.html" class="tool-pill">✂️ Split PDF</a>
      <a href="pdf-to-word.html" class="tool-pill">📄 PDF to Word</a>
      <a href="jpg-to-pdf.html" class="tool-pill">🖼️ JPG to PDF</a>
      <a href="sign.html" class="tool-pill">✍️ Sign PDF</a>
    </div>
  </div>
</body>
</html>
