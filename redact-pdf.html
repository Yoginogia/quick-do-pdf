<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Redact PDF online for free. Permanently black out sensitive text, names, addresses, and confidential information. No upload, works in browser.">
  <meta name="author" content="Quick Do PDF">
  <meta name="keywords" content="redact pdf, black out pdf text, censor pdf, hide text pdf, remove sensitive info pdf">
  <link rel="canonical" href="https://quickdopdf.com/redact-pdf.html">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Redact PDF Online Free — Black Out Sensitive Text | Quick Do PDF</title>
  <link rel="stylesheet" href="tools.css">
  <style>
    .redact-area { max-width: 900px; margin: 0 auto; padding: 20px 24px 40px; }
    .canvas-wrap {
      position: relative; background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; margin-bottom: 20px; min-height: 400px;
      display: flex; align-items: center; justify-content: center;
    }
    .canvas-wrap canvas { max-width: 100%; display: block; cursor: crosshair; }
    .toolbar {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 20px;
      padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    }
    .toolbar label { font-size: 13px; font-weight: 600; color: var(--muted); }
    .toolbar select, .toolbar input[type="color"] {
      padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.04); color: var(--text); font-family: inherit;
    }
    .page-nav { display: flex; gap: 10px; align-items: center; }
    .page-nav button {
      padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); cursor: pointer; font-weight: 600; transition: 0.3s;
    }
    .page-nav button:hover { border-color: var(--a1); }
    .page-info { font-size: 14px; color: var(--muted); font-weight: 600; }
    .action-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn-undo {
      padding: 12px 24px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.3s;
    }
    .btn-undo:hover { border-color: #fbbf24; color: #fbbf24; }

    /* HowTo Schema */
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="theme.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3543763798528021" crossorigin="anonymous"></script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "HowTo",
    "name": "How to Redact a PDF Online",
    "description": "Permanently black out sensitive text in PDF documents for free.",
    "step": [
      {"@type": "HowToStep", "position": 1, "name": "Upload PDF", "text": "Click upload or drag your PDF file into the tool."},
      {"@type": "HowToStep", "position": 2, "name": "Draw redaction boxes", "text": "Click and drag over areas you want to black out."},
      {"@type": "HowToStep", "position": 3, "name": "Download redacted PDF", "text": "Click Download to save the redacted PDF with sensitive info permanently removed."}
    ]
  }
  </script>
</head>
<body>
  <header>
    <a href="index.html" class="back-btn">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg> Back
    </a>
    <span class="logo">Quick Do PDF</span>
    <div class="header-right">
      <button class="theme-toggle-btn" id="themeToggle" title="Toggle Dark/Light Mode">
        <svg id="themeIcon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="tool-hero">
    <h1>🔒 Redact PDF</h1>
    <p class="subtitle">Permanently black out sensitive text, names, addresses, and confidential information from your PDF.</p>
  </div>

  <div class="upload-section">
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📝</div>
      <div class="upload-text">Drop PDF here or click to upload</div>
      <div class="upload-hint">Your file stays in your browser — never uploaded</div>
      <input type="file" id="fileInput" accept=".pdf" hidden>
    </div>
  </div>

  <div class="redact-area" id="redactArea" style="display:none;">
    <div class="toolbar">
      <label>Redaction Color:</label>
      <input type="color" id="redactColor" value="#000000" title="Redaction color">
      <div style="flex:1;"></div>
      <div class="page-nav">
        <button id="prevPage">← Prev</button>
        <span class="page-info" id="pageInfo">1 / 1</span>
        <button id="nextPage">Next →</button>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="pdfCanvas"></canvas>
      <canvas id="drawCanvas" style="position:absolute;top:0;left:0;"></canvas>
    </div>

    <div class="action-btns">
      <button class="btn-undo" id="undoBtn">↩️ Undo Last</button>
      <button class="btn-undo" id="clearBtn">🗑️ Clear Page</button>
      <button class="download-btn" id="downloadBtn">⬇️ Download Redacted PDF</button>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null, pdfBytes = null, currentPage = 1, totalPages = 0;
    let redactions = {}; // {pageNum: [{x,y,w,h}]}
    let isDrawing = false, startX = 0, startY = 0;
    let scale = 1.5;

    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const redactArea = document.getElementById('redactArea');
    const pdfCanvas = document.getElementById('pdfCanvas');
    const drawCanvas = document.getElementById('drawCanvas');
    const pdfCtx = pdfCanvas.getContext('2d');
    const drawCtx = drawCanvas.getContext('2d');
    const redactColor = document.getElementById('redactColor');

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = 'var(--a1)'; });
    uploadArea.addEventListener('dragleave', () => uploadArea.style.borderColor = '');
    uploadArea.addEventListener('drop', e => {
      e.preventDefault(); uploadArea.style.borderColor = '';
      if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

    async function handleFile(file) {
      pdfBytes = await file.arrayBuffer();
      pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes.slice(0) }).promise;
      totalPages = pdfDoc.numPages;
      redactions = {};
      currentPage = 1;
      redactArea.style.display = 'block';
      uploadArea.parentElement.style.display = 'none';
      renderPage();
    }

    async function renderPage() {
      const page = await pdfDoc.getPage(currentPage);
      const viewport = page.getViewport({ scale });
      pdfCanvas.width = drawCanvas.width = viewport.width;
      pdfCanvas.height = drawCanvas.height = viewport.height;
      await page.render({ canvasContext: pdfCtx, viewport }).promise;
      document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
      redrawOverlay();
    }

    function redrawOverlay() {
      drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      const rects = redactions[currentPage] || [];
      drawCtx.fillStyle = redactColor.value;
      rects.forEach(r => drawCtx.fillRect(r.x, r.y, r.w, r.h));
    }

    // Drawing
    drawCanvas.addEventListener('mousedown', e => {
      const rect = drawCanvas.getBoundingClientRect();
      startX = e.clientX - rect.left;
      startY = e.clientY - rect.top;
      isDrawing = true;
    });

    drawCanvas.addEventListener('mousemove', e => {
      if (!isDrawing) return;
      const rect = drawCanvas.getBoundingClientRect();
      const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
      redrawOverlay();
      drawCtx.fillStyle = redactColor.value + '80';
      drawCtx.fillRect(startX, startY, cx - startX, cy - startY);
    });

    drawCanvas.addEventListener('mouseup', e => {
      if (!isDrawing) return;
      isDrawing = false;
      const rect = drawCanvas.getBoundingClientRect();
      const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
      const w = cx - startX, h = cy - startY;
      if (Math.abs(w) > 5 && Math.abs(h) > 5) {
        if (!redactions[currentPage]) redactions[currentPage] = [];
        redactions[currentPage].push({ x: Math.min(startX, cx), y: Math.min(startY, cy), w: Math.abs(w), h: Math.abs(h) });
      }
      redrawOverlay();
    });

    // Touch support
    drawCanvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.touches[0], rect = drawCanvas.getBoundingClientRect();
      startX = t.clientX - rect.left; startY = t.clientY - rect.top; isDrawing = true;
    }, { passive: false });
    drawCanvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!isDrawing) return;
      const t = e.touches[0], rect = drawCanvas.getBoundingClientRect();
      const cx = t.clientX - rect.left, cy = t.clientY - rect.top;
      redrawOverlay();
      drawCtx.fillStyle = redactColor.value + '80';
      drawCtx.fillRect(startX, startY, cx - startX, cy - startY);
    }, { passive: false });
    drawCanvas.addEventListener('touchend', e => {
      if (!isDrawing) return; isDrawing = false;
      const t = e.changedTouches[0], rect = drawCanvas.getBoundingClientRect();
      const cx = t.clientX - rect.left, cy = t.clientY - rect.top;
      const w = cx - startX, h = cy - startY;
      if (Math.abs(w) > 5 && Math.abs(h) > 5) {
        if (!redactions[currentPage]) redactions[currentPage] = [];
        redactions[currentPage].push({ x: Math.min(startX, cx), y: Math.min(startY, cy), w: Math.abs(w), h: Math.abs(h) });
      }
      redrawOverlay();
    });

    // Navigation
    document.getElementById('prevPage').addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderPage(); } });
    document.getElementById('nextPage').addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderPage(); } });

    // Undo / Clear
    document.getElementById('undoBtn').addEventListener('click', () => {
      if (redactions[currentPage]?.length) { redactions[currentPage].pop(); redrawOverlay(); }
    });
    document.getElementById('clearBtn').addEventListener('click', () => {
      redactions[currentPage] = []; redrawOverlay();
    });

    // Download
    document.getElementById('downloadBtn').addEventListener('click', async () => {
      const { PDFDocument, rgb } = PDFLib;
      const pdfLibDoc = await PDFDocument.load(pdfBytes);
      const pages = pdfLibDoc.getPages();

      for (const [pageNumStr, rects] of Object.entries(redactions)) {
        const pageIdx = parseInt(pageNumStr) - 1;
        const page = pages[pageIdx];
        const { width, height } = page.getSize();
        const canvasW = pdfCanvas.width, canvasH = pdfCanvas.height;
        const hex = redactColor.value;
        const r = parseInt(hex.slice(1,3), 16) / 255;
        const g = parseInt(hex.slice(3,5), 16) / 255;
        const b = parseInt(hex.slice(5,7), 16) / 255;

        for (const rect of rects) {
          const pdfX = (rect.x / canvasW) * width;
          const pdfY = height - ((rect.y + rect.h) / canvasH) * height;
          const pdfW = (rect.w / canvasW) * width;
          const pdfH = (rect.h / canvasH) * height;
          page.drawRectangle({ x: pdfX, y: pdfY, width: pdfW, height: pdfH, color: rgb(r, g, b) });
        }
      }

      const bytes = await pdfLibDoc.save();
      const blob = new Blob([bytes], { type: 'application/pdf' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'redacted.pdf';
      a.click();
    });

    redactColor.addEventListener('change', redrawOverlay);
  </script>
</body>
</html>
